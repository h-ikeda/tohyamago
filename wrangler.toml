name = "tohyamago"
compatibility_date = "2026-01-01"

# プロダクション環境はカスタムドメインでのみ公開し、workers.dev のルートは無効化する
workers_dev = false
# プレビューデプロイは workers.dev のサブドメインで一意な URL を発行する
preview_urls = true

# デプロイは GitHub Actions (.github/workflows/deploy.yml) で `npm run build` →
# `wrangler deploy` の順に実行する。ビルドは CI 側で明示的に行うため、
# wrangler 側の [build] は設定せず二重ビルドを避ける。

[assets]
directory = "./dist"
not_found_handling = "404-page"
