<svg width="1600" height="1000" viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg">
  <!--
    遠山郷応援会 ヒーロー画 (ブランド意匠の専用イラスト)。
    SiteLogo の意匠 (遠く重なる稜線 + 陽光 + コーラルの頂) を風景へ展開し、
    秘境の朝もや・段々畑を加えてトップの世界観を立ち上げる。
    デザインシステムの色 (深緑 #1f855f / ティール #44b08c / 陽光 #ffc24b /
    コーラル #f06b4b / 空 #d6eef1) を使用。テキストは下部に重ねる前提で、
    視覚の主役 (陽・稜線) を上半分に、静かな段々畑を下半分に配置する。
  -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bfe3ea"/>
      <stop offset="0.45" stop-color="#dcefee"/>
      <stop offset="0.72" stop-color="#fbf0d2"/>
      <stop offset="1" stop-color="#ffe6ac"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff4d2" stop-opacity="0.95"/>
      <stop offset="0.35" stop-color="#ffd97a" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffd97a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ridgeFar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a6dcc9"/>
      <stop offset="1" stop-color="#8fceb6"/>
    </linearGradient>
    <linearGradient id="ridgeMid" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0" stop-color="#4fb791"/>
      <stop offset="1" stop-color="#69c4a3"/>
    </linearGradient>
    <linearGradient id="ridgeMain" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0" stop-color="#1f855f"/>
      <stop offset="0.7" stop-color="#2b9670"/>
      <stop offset="1" stop-color="#3aa57e"/>
    </linearGradient>
    <linearGradient id="field" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2f9b6f"/>
      <stop offset="1" stop-color="#176545"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <filter id="mist" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>

  <!-- 空 -->
  <rect width="1600" height="1000" fill="url(#sky)"/>

  <!-- 陽光: やわらかな朝日とサンバーストの光条 (ロゴの陽光モチーフを継承) -->
  <circle cx="1170" cy="250" r="320" fill="url(#sunGlow)"/>
  <g fill="#ffd97a" opacity="0.5">
    <circle cx="1170" cy="250" r="78"/>
  </g>
  <circle cx="1170" cy="250" r="64" fill="#ffe7a6"/>

  <!-- 奥の稜線 (遠さ・淡いティール) -->
  <path d="M0,560 Q210,470 380,505 T740,452 Q930,415 1110,486 T1520,452 Q1565,462 1600,476 L1600,1000 L0,1000 Z"
        fill="url(#ridgeFar)" opacity="0.92"/>
  <!-- 奥のもや -->
  <ellipse cx="780" cy="556" rx="900" ry="60" fill="#ffffff" opacity="0.55" filter="url(#mist)"/>

  <!-- 中景の稜線 -->
  <path d="M0,640 Q180,520 360,560 Q540,600 700,520 Q880,432 1060,540 Q1240,640 1420,556 Q1520,512 1600,540 L1600,1000 L0,1000 Z"
        fill="url(#ridgeMid)" opacity="0.96"/>

  <!-- 中景のもや -->
  <ellipse cx="900" cy="636" rx="1000" ry="54" fill="#ffffff" opacity="0.45" filter="url(#mist)"/>

  <!-- 主峰 (深緑) -->
  <path d="M0,740 Q240,560 470,650 Q620,710 760,610 Q900,512 1060,628 Q1240,760 1430,648 Q1520,596 1600,636 L1600,1000 L0,1000 Z"
        fill="url(#ridgeMain)"/>

  <!-- コーラルの頂: 朝日を受ける主峰の頂 (ロゴの差し色を継承するブランドの峰) -->
  <path d="M744,560 L815,470 L886,560 Z" fill="#f06b4b"/>
  <path d="M815,470 L886,560 L815,560 Z" fill="#f7a892" opacity="0.9"/>
  <path d="M793,498 L815,470 L838,498 L815,512 Z" fill="#fff0e8" opacity="0.85"/>

  <!-- 前景: 段々畑 (遠山郷の象徴。等高線状の段で表現) -->
  <path d="M0,792 Q300,724 640,756 Q1000,790 1320,742 Q1470,720 1600,742 L1600,1000 L0,1000 Z"
        fill="url(#field)"/>
  <g fill="none" stroke-linecap="round">
    <path d="M-20,818 Q320,756 660,786 Q1010,818 1340,774 Q1480,756 1620,776" stroke="#5ec095" stroke-width="4" opacity="0.7"/>
    <path d="M-20,826 Q320,764 660,794 Q1010,826 1340,782 Q1480,764 1620,784" stroke="#176545" stroke-width="9" opacity="0.45"/>
    <path d="M-20,860 Q320,802 680,834 Q1030,866 1360,822 Q1490,804 1620,824" stroke="#5abd92" stroke-width="4" opacity="0.6"/>
    <path d="M-20,868 Q320,810 680,842 Q1030,874 1360,830 Q1490,812 1620,832" stroke="#135c3d" stroke-width="11" opacity="0.45"/>
    <path d="M-20,906 Q340,850 700,882 Q1040,912 1380,870 Q1500,854 1620,872" stroke="#57b88d" stroke-width="4" opacity="0.6"/>
    <path d="M-20,914 Q340,858 700,890 Q1040,920 1380,878 Q1500,862 1620,880" stroke="#11543a" stroke-width="13" opacity="0.45"/>
    <path d="M-20,956 Q340,902 720,932 Q1060,960 1400,920 Q1520,906 1620,922" stroke="#50b187" stroke-width="4" opacity="0.6"/>
    <path d="M-20,964 Q340,910 720,940 Q1060,968 1400,928 Q1520,914 1620,930" stroke="#0e4d33" stroke-width="15" opacity="0.5"/>
  </g>
  <!-- 段畑の陽だまり -->
  <ellipse cx="1120" cy="812" rx="380" ry="46" fill="#ffe6ac" opacity="0.16" filter="url(#soft)"/>
</svg>
