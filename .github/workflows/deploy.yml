name: Deploy

# Cloudflare Workers へのデプロイを wrangler CLI で実行する。
# 以前は Cloudflare ダッシュボードの GitHub 連携 (Workers Builds) で自動公開していたが、
# 将来の環境設定 (環境変数・シークレット・ビルド手順) の複雑化に対応するため、
# デプロイ手順を本リポジトリ側 (GitHub Actions + wrangler) に集約する。
#
# CI (ci.yml) の完了を workflow_run でトリガーし、CI が成功したときのみデプロイする
# (品質チェック・ビルド検証を通過していない変更を公開しないためのゲート)。
#
# セキュリティ: workflow_run は特権コンテキスト (Cloudflare シークレットを参照可能) で動く。
# ここで PR の信頼できないコードを checkout / 実行すると "pwn request" の危険があるため、
#   - リポジトリは信頼できるデフォルトブランチ (main) のみ checkout し、
#   - ビルド成果物 (dist) は CI (非特権コンテキスト) がアップロードしたアーティファクトを受け取り、
#     ここでは再ビルドせず wrangler でアップロードするだけにする。
#
# 必要なシークレット / 変数 (GitHub の Settings に登録):
#   secrets.CLOUDFLARE_API_TOKEN  … Workers のデプロイ権限を持つ API トークン
#   secrets.CLOUDFLARE_ACCOUNT_ID … Cloudflare のアカウント ID

on:
  workflow_run:
    workflows: ['CI']
    types:
      - completed

# 既定は読み取りのみ。各ジョブで必要な権限だけを明示的に付与する
permissions:
  contents: read

# 同一ブランチへの並行デプロイをまとめ、古い実行はキャンセルする
concurrency:
  group: deploy-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  # main の CI が成功したら、カスタムドメインの本番環境へ公開する
  deploy:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read # 別 run のアーティファクトを取得するため
    steps:
      # 信頼できるデフォルトブランチ (main) のみを checkout する (PR の head は使わない)
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # CI がビルドした dist を受け取る (ここでは再ビルドしない)
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: dist
          path: dist
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
      - run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # PR の CI が成功したら、プレビュー版をアップロードし一意なプレビュー URL を発行する。
  # シークレットを参照できない fork / Dependabot の PR ではスキップする。
  preview:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.head_repository.full_name == github.repository &&
      github.event.workflow_run.triggering_actor.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read # 別 run のアーティファクトを取得するため
    steps:
      # PR の信頼できない wrangler.toml を避けるため、設定は main のものを使う
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # PR の CI がビルドした dist (静的アセット) を受け取り、アップロードのみ行う
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: dist
          path: dist
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
      - run: npx wrangler versions upload
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
